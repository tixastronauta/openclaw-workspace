services:
  nyx-mission-control:
    build:
      context: .
      args:
        BASE_IMAGE: ${NYX_MC_BASE_IMAGE:-node:24-alpine}
    container_name: nyx-mission-control
    restart: unless-stopped
    ports:
      - "127.0.0.1:4317:4317"
    environment:
      - PORT=4317
      - WORKSPACE_DIR=/workspace
      - OPENCLAW_DIR=/openclaw
      - CACHE_DIR=/app/data
      - REFRESH_MS=30000
    volumes:
      - ${WORKSPACE_HOST_DIR:-/data/.openclaw/workspace}:/workspace:ro
      - ${OPENCLAW_HOST_DIR:-/data/.openclaw}:/openclaw:ro
      - ./data:/app/data
